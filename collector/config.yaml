# OpenClaw Monitor Collector 配置

# 监控后端地址
server_url: "http://127.0.0.1:9200"

# Collector API Key (需与服务端 COLLECTOR_API_KEY 环境变量一致)
api_key: "123456"

# 实例标识 (每台机器唯一)
instance_name: "prod-01"

# 采集间隔 (秒)
heartbeat_interval: 60
agents_interval: 120
sessions_interval: 60
# Agent 文档同步间隔 (秒), 默认 1 小时
doc_sync_interval: 3600

# OpenClaw 数据目录所属用户的 HOME 路径
# 当采集器以其他用户运行时，需指定运行 OpenClaw 的用户 HOME 目录
# 例如 OpenClaw 以 root 运行，则填 /root
# 留空则使用当前用户的 HOME
openclaw_home: ""
